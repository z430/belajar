<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS Quiz</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      .question-container {
        max-width: 600px;
        margin: auto;
        margin-top: 30px;
      }
      .question-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .question-number {
        margin-bottom: 1rem;
      }
      .options {
        margin-left: -1.25rem; /* Aligns radio buttons with question text */
      }
      .options input {
        margin-top: 0.3rem;
        margin-right: 0.5rem;
      }
      .options label {
        display: block;
        padding: 0.5rem 1rem;
        border: 1px solid #ccc;
        border-radius: 0.25rem;
        margin-bottom: 0.5rem;
        cursor: pointer;
        transition: background-color 0.15s ease-in-out;
      }
      .options input:checked + label {
        background-color: #e9ecef;
        border-color: #adb5bd;
      }
      .navigation-buttons {
        display: flex;
        justify-content: space-between;
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <div
      class="question-container bg-light p-4 rounded-3 shadow-sm"
      id="startContainer"
    >
      <button id="btnStartQuiz" class="btn btn-primary">Start Quiz</button>
    </div>

    <div
      class="question-container bg-light p-4 rounded-3 shadow-sm"
      id="quizContainer"
      hidden
    >
      <div class="question-header mb-4">
        <h2 class="h4">Dummy Quiz</h2>
        <span id="totalQuestion">Question</span>
      </div>

      <p id="questionName" class="question-number h5"></p>
      <div id="optionsContainer" class="options"></div>
      <div class="navigation-buttons">
        <button id="btnPrevQuestion" class="btn btn-secondary">Previous</button>
        <button id="btnNextQuestion" class="btn btn-primary">Next</button>
      </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="index.js"></script>
  </body>
</html>
